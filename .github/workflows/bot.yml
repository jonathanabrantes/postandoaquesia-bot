name: bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: read

concurrency:
  group: bot
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Executar bot
        run: |
          docker pull ghcr.io/jonathanabrantes/postandoaquesia-bot:latest
          docker run --rm --shm-size=2g \
            -v "${{ github.workspace }}/data:/app/data" \
            ghcr.io/jonathanabrantes/postandoaquesia-bot:latest

      - name: Commitar CSV atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/followers.csv
          if git diff --staged --quiet; then
            echo "Sem alterações no CSV."
          else
            git commit -m "chore(bot): atualiza followers.csv"
            git push
          fi
