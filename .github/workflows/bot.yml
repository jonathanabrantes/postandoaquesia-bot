name: bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser chromium-chromedriver

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar bot
        run: python bot/fetch.py

      - name: Commitar CSV atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/followers.csv
          if git diff --staged --quiet; then
            echo "Sem alterações no CSV."
          else
            git commit -m "chore(bot): atualiza followers.csv"
            git push
          fi
