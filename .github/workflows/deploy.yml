name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-$HOME/postandoaquesia-bot}"
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              git clone git@github.com:jonathanabrantes/postandoaquesia-bot.git "$DEPLOY_PATH"
            fi
            cd "$DEPLOY_PATH"
            git pull origin main
            ./deploy.sh
