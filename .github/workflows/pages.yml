name: pages

on:
  push:
    branches: [main]
    paths:
      - index.html
      - data/followers.csv
      - .nojekyll
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Preparar site estático
        run: |
          mkdir -p _site/data
          cp index.html .nojekyll _site/
          cp data/followers.csv _site/data/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
